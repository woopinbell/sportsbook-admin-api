spring:
  application:
    name: admin-api

  # ADR-0005: PostgreSQL 16 + Flyway. admin-api owns exactly one table —
  # audit_log (ADR-0011). It touches no business store; every business read /
  # write goes through a downstream /internal/v1 API.
  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/admin}
    username: ${ADMIN_DB_USER:admin}
    password: ${ADMIN_DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: admin-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  # Port allocation across sportsbook services (the running set diverged from
  # the early plan): wallet 8081, betting 8082, risk 8083, settlement 8084,
  # odds-feed 8085, gateway 8080. admin-api takes 8090 (separate admin tier).
  port: ${ADMIN_HTTP_PORT:8090}
  shutdown: graceful

# ADR-0007: Actuator with liveness/readiness probes split; Prometheus scrape.
# health is locked down to authorized callers — admin-api is security-critical.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: admin-api

logging:
  level:
    root: INFO
    com.sportsbook.admin: INFO
    org.hibernate.SQL: WARN
